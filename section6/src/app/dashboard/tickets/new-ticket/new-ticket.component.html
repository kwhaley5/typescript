<form (ngSubmit)="onSubmit()" #form>
  <p>
    <label>Title</label>
    <input name="title" id="title" [(ngModel)]="enteredTitle" />
  </p>
  <p>
    <label>Request</label>
    <textarea name="=requst" , id="requst" rows="3" [(ngModel)]="enteredRequest"></textarea>
  </p>
  <button appButton text="Submit" symbol="→"></button>
</form>
