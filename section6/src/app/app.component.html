<app-header />

<main>
  <div id="dashboard">
    <app-dashboard-item
      [img]="{ src: 'status.png', alt: 'A signal symbol' }"
      header="Server Status"
    >
      <app-server-status />
    </app-dashboard-item>

    <app-dashboard-item
      [img]="{ src: 'globe.png', alt: 'A globe symbol' }"
      header="Server Traffic"
    >
      <app-traffic />
    </app-dashboard-item>

    <app-dashboard-item
      [img]="{ src: 'list.png', alt: 'A list of items' }"
      header="Support Tickets"
    >
      <app-tickets />
    </app-dashboard-item>
  </div>
</main>
